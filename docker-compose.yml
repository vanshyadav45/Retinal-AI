version: '3.9'

x-env: &common-env
  DATABASE_URL: postgresql+psycopg://retinalai:retinalai@postgres:5432/retinalai

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: retinalai
      POSTGRES_USER: retinalai
      POSTGRES_PASSWORD: retinalai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U retinalai -d retinalai']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.example
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./ml:/app/ml
    ports:
      - '8000:8000'

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - '5173:80'

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./reports:/usr/share/nginx/html/reports:ro

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.0
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - '5000:5000'

volumes:
  pgdata:
